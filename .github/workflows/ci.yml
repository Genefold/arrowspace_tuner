name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pytest is intentionally excluded from CI: arrowspace ships as a compiled
# Rust/PyO3 wheel and does not have pre-built binaries for ubuntu-latest
# GitHub Actions runners. Run `uv run pytest` locally before merging.

jobs:
  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (no arrowspace — lint only)
        run: uv sync --extra dev --no-install-project

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy)
        run: uv run mypy src
